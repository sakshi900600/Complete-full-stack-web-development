<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text and Box shadow tutorial</title>
</head>

<style>
.box{
    border: 2px solid violet;
    box-sizing: border-box;
    padding: 23px;
    box-shadow: 5px 5px 5px violet;
}
p{
    text-shadow: 3px 7px 2px #0c23db;
    border: 2px solid blue;
    outline: 2px solid brown;
    outline-offset: 33px;
    margin-top: 75px;
    padding: 23px;

}
</style>
<body>
    
    <div class="box">
        I am a box
    </div>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Culpa eius rem ab praesentium? Aperiam error eaque aliquam sequi maiores quibusdam.</p>
</body>
</html>
