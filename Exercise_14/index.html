<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<body>
    <style>
        body {
            background-color: green;
            color: white;
        }
    </style>

    <!-- create a hacking simulator which has green background and it shows these messages with random delay of 1 to 7 seconds
    
    Initilizing Hacking...
    Reading your Files...
    Password files Detected...
    Sending all passwords and personal files to server...
    Cleaning up...

    the three dots must blink so that it looks like a real terminal

 -->

    <!-- <div></div> -->


    <script>

        const addItem = async (item) => {
            await randomdelay()
            let div = document.createElement("div")
            div.innerHTML = item
            document.body.append(div)
        }
        const randomdelay = () => {
            return new Promise((resolve, reject) => {
                timeout = 1 + 6 * Math.random()
                setTimeout(() => {
                    resolve()
                }, timeout * 1000);
            })
        }

        async function main() {
            let t= setInterval(() => {
                let last = document.body.getElementsByTagName("div");
                last = last[last.length - 1]
                if (last.innerHTML.endsWith("...")) {
                    last.innerHTML = last.innerHTML.slice(0, last.innerHTML.length - 3)
                }
                else {
                    last.innerHTML = last.innerHTML + "."
                }
            }, 100);

            let text = ["Initilizing Hacking",
                "Reading your Files",
                "Password files Detected",
                "Sending all passwords and personal files to server",
                "Cleaning up"
            ]

            for (const item of text) {
                await addItem(item)
            }
            await randomdelay()
            clearInterval(t)
        }
        main()

    </script>
</body>

</html>
