<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<style>
    /* :root{
        --pricolor: red;
        --textcolor: rgb(244, 209, 11);
        --tercolor: blue;
    } */

    :root{
        --pricolor: rgb(236, 101, 12);
        --textcolor: rgb(7, 1, 19);
        --tercolor: rgb(248, 221, 72);
    }
    body{
        background-color: var(--tercolor);
    }
    nav ul{
        display: flex;
        background-color: var(--pricolor);
    }
   
    nav ul li{
        list-style: none;
        padding: 12px 23px;
        color: var(--textcolor);
    }
</style>
<body>
    
    <!-- Create a multicolor navbar using CSS Variables & Global variables.. -->

    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Service</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
</html>
