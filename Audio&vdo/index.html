<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio, video and Media in html</title>
</head>
<body>
    
    <!-- video tags -->
    <!-- controls -
    autoplay, loops,muted, poster, 
    -->
    <video src="video.mp4" height="222" controls loop muted poster="download.jpeg"></video>

    <!-- Audio -->
    <!-- controls -
    autoplay, loops,muted, preload= none,auto-dnld &run odo,metadata-show only data, 
    -->
    <audio src="audio.mp3" controls loop muted></audio>

    <!-- SVG -->
    <!-- <svg height="100" width="100">
        <circle cx="30" cy="30" r="20" stroke="black" stroke-width="3" fill="red" ></circle>
    </svg> -->

    <img src="img.svg" alt="mysvg image">

    <!-- iframes- embedding any website -->
    <iframe src="https://www.codewithharry.com/" frameborder="0" width="222" height="223"></iframe>

</body>
</html>
