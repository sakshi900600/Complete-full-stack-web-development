    <h1>Student Registration Form</h1>

    <div class="radio">
        <label for="Student"><input type="radio" name="Student" id="">New Student</label>

        <label for="Student"><input type="radio" name="Student" id="">Old Student</label>

    <form action="#" method="post">
        

        <label for="fname">Enter your first name<input type="text" name="fname" id="fnamem"></label><br>

        <input type="submit" value="submit">
