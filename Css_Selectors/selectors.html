.boxes::before{
    content: "Hey this is sakshi.";
}
.boxes::after{
    content: "Hey this is sakshi.";
}
::selection{
    background-color: chartreuse;
    color: cadetblue;
}
.box::first-letter{
    color: blueviolet;
    font-size: 56px;
}
input::placeholder{
    color: blue;
}
</style>
<body>
    
    <div class="boxes">
        <div  data-color="primary"   class="box">this a first box</div>
        <div class="box">this is second box</div>
        <div class="box">this is third box</div>
    </div>
    <input type="text" placeholder="enter your name">
